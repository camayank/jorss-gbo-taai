<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Jorss-Gbo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans, 'DM Sans', system-ui, -apple-system, sans-serif);
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            color: #1e293b;
        }
        .error-page { text-align: center; max-width: 480px; }
        .error-illustration { margin-bottom: 1.5rem; }
        .error-illustration svg { animation: gentle-float 3s ease-in-out infinite; }
        @keyframes gentle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .error-code { font-size: 96px; font-weight: 700; color: #0B1D3A; line-height: 1; margin-bottom: 0.5rem; }
        .error-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
        .error-message { color: #64748b; line-height: 1.625; margin-bottom: 2rem; font-size: 1rem; }
        .error-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: all 0.2s ease; cursor: pointer; border: none; }
        .btn-primary { background: #0B1D3A; color: #ffffff; }
        .btn-primary:hover { background: #132844; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30, 58, 95, 0.3); }
        .btn-secondary { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #e2e8f0; }
        .brand { margin-top: 3rem; color: #94a3b8; font-size: 0.8rem; }
        .brand a { color: #64748b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-illustration">
            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none" aria-hidden="true">
                <!-- Document body -->
                <rect x="28" y="14" width="56" height="72" rx="4" fill="#0B1D3A" opacity="0.1" stroke="#0B1D3A" stroke-width="2.5"/>
                <!-- Folded corner -->
                <path d="M68 14v16h16" fill="#f8fafc" stroke="#0B1D3A" stroke-width="2.5" stroke-linejoin="round"/>
                <!-- Text lines on document -->
                <line x1="40" y1="46" x2="72" y2="46" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                <line x1="40" y1="54" x2="66" y2="54" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                <line x1="40" y1="62" x2="58" y2="62" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                <!-- Magnifying glass circle -->
                <circle cx="82" cy="84" r="18" fill="#f8fafc" stroke="#0B1D3A" stroke-width="3"/>
                <!-- Question mark inside magnifying glass -->
                <text x="82" y="90" text-anchor="middle" font-family="inherit" font-size="20" font-weight="700" fill="#0B1D3A">?</text>
                <!-- Magnifying glass handle -->
                <line x1="95" y1="97" x2="108" y2="110" stroke="#0B1D3A" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved.
            Check the URL or navigate back to a page you know.
        </p>
        <div class="error-actions">
            <a href="{{ dashboard_url | default('/') }}" class="btn btn-primary">Return to Dashboard</a>
            <button onclick="history.back()" class="btn btn-secondary">Go Back</button>
        </div>
        <p class="brand">
            <a href="/">Jorss-Gbo Tax Platform</a>
        </p>
    </div>
</body>
</html>
