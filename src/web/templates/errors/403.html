<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Jorss-Gbo</title>
    <link rel="stylesheet" href="/static/css/core/variables.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans, 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif);
            background: var(--color-cream, #FAF8F4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            color: var(--color-slate-800, #1e293b);
        }
        .error-page { text-align: center; max-width: 480px; }
        .error-illustration { margin-bottom: 1.5rem; }
        .error-illustration svg { animation: gentle-float 3s ease-in-out infinite; }
        @keyframes gentle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .error-code { font-size: 96px; font-weight: 700; color: var(--color-navy); line-height: 1; margin-bottom: 0.5rem; }
        .error-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
        .error-message { color: var(--color-slate, #64748b); line-height: 1.625; margin-bottom: 2rem; font-size: 1rem; }
        .error-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: all 0.2s ease; cursor: pointer; border: none; }
        .btn-primary { background: var(--color-gold, #f97316); color: var(--color-navy, #0f766e); }
        .btn-primary:hover { background: var(--color-gold-light, #fb923c); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3); }
        .btn-secondary { background: var(--color-gray-100, #f1f5f9); color: var(--color-slate-700, #334155); border: 1px solid var(--color-gray-200, #e2e8f0); }
        .btn-secondary:hover { background: var(--color-gray-200, #e2e8f0); }
        .brand { margin-top: 3rem; color: var(--color-slate-light, #94a3b8); font-size: 0.8rem; }
        .brand a { color: var(--color-slate, #64748b); text-decoration: none; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-illustration">
            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none" aria-hidden="true">
                <!-- Shield body -->
                <path d="M60 10L20 30v30c0 24.5 17 47.2 40 52 23-4.8 40-27.5 40-52V30L60 10z" fill="#0f766e" opacity="0.1" stroke="#0f766e" stroke-width="2.5" stroke-linejoin="round"/>
                <!-- Lock body -->
                <rect x="44" y="58" width="32" height="24" rx="3" fill="#0f766e" opacity="0.85"/>
                <!-- Lock shackle -->
                <path d="M50 58V48a10 10 0 0 1 20 0v10" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round"/>
                <!-- Keyhole -->
                <circle cx="60" cy="68" r="3.5" fill="#f8fafc"/>
                <rect x="58.5" y="70" width="3" height="5" rx="1" fill="#f8fafc"/>
            </svg>
        </div>
        <div class="error-code">403</div>
        <h1 class="error-title">Access Denied</h1>
        <p class="error-message">
            You don't have permission to access this resource.
            Please log in with an authorized account or contact your administrator.
        </p>
        <div class="error-actions">
            <a href="{{ dashboard_url | default('/') }}" class="btn btn-primary">Return to Dashboard</a>
            <a href="/login" class="btn btn-secondary">Log In</a>
        </div>
        <p class="brand">
            <a href="/">Jorss-Gbo Tax Platform</a>
        </p>
    </div>
</body>
</html>
