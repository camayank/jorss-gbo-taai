# =============================================================================
# Render Blueprint - Jorss-GBO AI Tax Advisor (Free Tier)
# =============================================================================
# Standalone advisory deployment — SQLite only, no PostgreSQL/Redis required.
#
# Deploy with: https://render.com/deploy
#
# After deploy, set in the Render dashboard:
#   OPENAI_API_KEY — Required for AI features
#   CORS_ORIGINS   — https://mayankwadhera.com
# =============================================================================

services:
  - type: web
    name: jorss-gbo
    runtime: python
    region: oregon
    plan: free

    # Build: install deps only (skip preflight/migrations for SQLite mode)
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # Start command (1 worker + preload to fit in 512MB free tier)
    startCommand: >-
      PYTHONPATH=src gunicorn web.app:app
      --bind 0.0.0.0:$PORT
      --workers 1
      --worker-class uvicorn.workers.UvicornWorker
      --timeout 120
      --keep-alive 5
      --preload

    # Health check
    healthCheckPath: /health/live

    envVars:
      # ----- Core (beta = skip PostgreSQL/Redis startup requirement) -----
      - key: APP_ENVIRONMENT
        value: beta
      - key: ENVIRONMENT
        value: beta
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: src
      - key: LOG_LEVEL
        value: INFO

      # ----- SQLite mode (no PostgreSQL needed) -----
      - key: DATABASE_PATH
        value: ./data/tax_returns.db
      - key: DB_PERSISTENCE
        value: "true"
      - key: SESSION_STORAGE_TYPE
        value: sqlite
      - key: ALLOW_MISSING_OPENAI
        value: "true"

      # ----- Security -----
      - key: APP_ENFORCE_HTTPS
        value: "true"
      - key: APP_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CSRF_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_MASTER_KEY
        generateValue: true
      - key: SSN_HASH_SECRET
        generateValue: true
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: PASSWORD_SALT
        generateValue: true
      - key: SERIALIZER_SECRET_KEY
        generateValue: true
      - key: AUDIT_HMAC_KEY
        generateValue: true

      # ----- CORS -----
      - key: CORS_ORIGINS
        value: "https://mayankwadhera.com,http://localhost:8000"

      # ----- AI (set in dashboard) -----
      - key: OPENAI_API_KEY
        sync: false

      # ----- Feature Flags -----
      - key: AI_CHAT_ENABLED
        value: "true"
      - key: AI_SAFETY_CHECKS
        value: "true"
      - key: UNIFIED_FILING
        value: "true"
      - key: NEW_LANDING
        value: "true"

      # ----- Branding -----
      - key: PLATFORM_NAME
        value: "AI Tax Advisor"
      - key: COMPANY_NAME
        value: "Mayank Wadhera"
