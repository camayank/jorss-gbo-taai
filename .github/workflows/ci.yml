name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint + Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Lint (Ruff syntax/safety)
        run: ruff check src tests/security --select E9,F63,F7,F82

      - name: Security scan (Bandit — all severities)
        run: |
          bandit -r src/ -l --skip B101 \
            -f json -o bandit-report.json || true
          bandit -r src/ -l --skip B101 \
            -f txt || echo "::warning::Bandit found security issues — see bandit-report.json artifact"

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit --desc || echo "::warning::pip-audit found vulnerable dependencies — see pip-audit-report.json artifact"

      - name: Upload security scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

      - name: Migration graph integrity
        run: |
          python -c "
          from scripts.preflight_launch import check_migration_graph
          result = check_migration_graph()
          print(f'{result.level}: {result.message}')
          assert result.level == 'PASS', f'Migration graph check failed: {result.message}'
          "

      - name: Launch blocker security tests
        run: |
          pytest -q \
            tests/security/test_admin_launch_blockers.py \
            tests/security/test_cpa_internal_route_auth.py \
            tests/security/test_web_launch_route_guards.py \
            tests/security/test_web_duplicate_route_guardrails.py

      - name: Full test suite with coverage
        run: |
          pytest tests/ -x --timeout=120 -q \
            --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=70 \
            --ignore=tests/performance \
            --ignore=tests/load \
            -k "not slow"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  infrastructure:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/terraform/
        continue-on-error: true

      - name: Terraform Init (local state for validation)
        run: |
          cd infra/terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

  frontend:
    name: Frontend Lint + Tests + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            src/web/static/js/package-lock.json

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: CSS lint
        run: npm run lint:css

      - name: Storybook build
        run: npm run build-storybook

      - name: Install JS test dependencies
        run: npm ci
        working-directory: src/web/static/js

      - name: JS unit tests
        run: npm run test
        working-directory: src/web/static/js

  deploy:
    name: Deploy to Render
    needs: [backend, frontend, infrastructure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK_URL not set — skipping deployment"
            echo "Set this secret in GitHub → Settings → Secrets → Actions"
            echo "Get the URL from Render → Service → Settings → Deploy Hook"
            exit 0
          fi
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            && echo "Deploy triggered successfully" \
            || echo "::warning::Deploy hook failed — check Render dashboard"

      - name: Wait for deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: sleep 60

      - name: Checkout (for smoke test)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke test
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          APP_URL="${{ secrets.RENDER_APP_URL }}"
          if [ -z "$APP_URL" ]; then
            echo "::notice::RENDER_APP_URL not set — skipping smoke test"
            exit 0
          fi
          python scripts/smoke_test.py "$APP_URL" || echo "::warning::Smoke test failed"

  deploy-staging:
    name: Deploy to AWS ECS Staging
    needs: [backend, frontend, infrastructure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        env:
          ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query taskDefinition \
            > task-definition.json

      - name: Render new ECS task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: ECS staging deploy health check
        env:
          ALB_URL: ${{ secrets.STAGING_ALB_URL }}
        run: |
          if [ -z "$ALB_URL" ]; then
            echo "::notice::STAGING_ALB_URL not set — skipping health check"
            exit 0
          fi
          for i in {1..5}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$ALB_URL/health/live") || true
            [ "$STATUS" = "200" ] && echo "Health check passed" && exit 0
            echo "Attempt $i: got $STATUS, retrying in 15s…"
            sleep 15
          done
          echo "::warning::Staging health check timed out after 5 attempts"
